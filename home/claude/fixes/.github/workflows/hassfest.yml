name: Hassfest

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  validate:
    name: Validate with Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate with Hassfest
        uses: home-assistant/actions/hassfest@master
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
