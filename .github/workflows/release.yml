name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Prepare Release ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Bump version in manifest.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"  # strip leading 'v'
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/toniebox/manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/toniebox/manifest.json
          echo "Version set to $VERSION"

      - name: Create release ZIP
        run: |
          cd custom_components
          zip -r ../toniebox.zip toniebox/ -x "**/__pycache__/*" -x "**/*.pyc"
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: toniebox.zip
          body: |
            ## Toniebox Integration ${{ github.ref_name }}

            ### Installation
            Download `toniebox.zip`, extract to `config/custom_components/`, restart HA.

            Or use [HACS](https://hacs.xyz) for automatic updates.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
