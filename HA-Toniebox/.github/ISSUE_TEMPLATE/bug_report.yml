name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2024.3.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration Version
      placeholder: "e.g. 1.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: |
        Paste any relevant log output here. Enable debug logging with:
        ```yaml
        logger:
          logs:
            custom_components.toniebox: debug
        ```
      render: text
