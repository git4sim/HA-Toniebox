clear_chapters:
  name: Clear Chapters
  description: Remove all chapters from a Creative Tonie.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player

sort_chapters:
  name: Sort Chapters
  description: Sort the chapters on a Creative Tonie.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player
    sort_by:
      name: Sort By
      description: Sort chapters by title, filename, or date.
      default: title
      selector:
        select:
          options:
            - title
            - filename
            - date

remove_chapter:
  name: Remove Chapter
  description: Remove a single chapter by its ID.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player
    chapter_id:
      name: Chapter ID
      description: The ID of the chapter to remove (from the 'chapters' attribute).
      required: true
      selector:
        text:

move_chapter:
  name: Move Chapter
  description: Move a chapter one position up or down on a Creative Tonie.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player
    chapter_id:
      name: Chapter ID
      description: The ID of the chapter to move (from the 'chapters' attribute).
      required: true
      selector:
        text:
    direction:
      name: Direction
      description: "'up' moves earlier, 'down' moves later in the list."
      default: up
      selector:
        select:
          options:
            - up
            - down

upload_audio:
  name: Upload Audio
  description: >
    Upload a local audio file and add it as a new chapter to a Creative Tonie.
    The file must be accessible from the Home Assistant host
    (e.g. /config/tonie_audio/story.mp3).
    Supported formats: mp3, ogg, wav, flac, m4a, aac, opus.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player
    file_path:
      name: File Path
      description: Absolute path to the audio file on the HA host.
      required: true
      selector:
        text:
    title:
      name: Chapter Title
      description: Title of the new chapter. Defaults to the filename without extension.
      required: false
      selector:
        text:

rename_tonie:
  name: Rename Tonie
  description: Rename a Creative Tonie.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player
    name:
      name: New Name
      description: The new name for the Tonie.
      required: true
      selector:
        text:

rename_toniebox:
  name: Rename Toniebox
  description: Rename a Toniebox device.
  fields:
    entity_id:
      name: Toniebox
      description: The media_player entity of the Toniebox.
      required: true
      selector:
        entity:
          domain: media_player
    name:
      name: New Name
      description: The new name for the Toniebox.
      required: true
      selector:
        text:

redeem_content_token:
  name: Redeem Content Token
  description: Redeem a free content token onto a Creative Tonie.
  fields:
    entity_id:
      name: Creative Tonie
      description: The media_player entity of the target Creative Tonie.
      required: true
      selector:
        entity:
          domain: media_player
    token:
      name: Token
      description: The content token to redeem.
      required: true
      selector:
        text:

apply_tune:
  name: Apply Tune
  description: Apply a purchased Tune to a Tonie.
  fields:
    entity_id:
      name: Tonie
      description: The Tonie media_player entity.
      required: true
      selector:
        entity:
          domain: media_player
    tune_id:
      name: Tune ID
      description: The ID of the tune to apply.
      required: true
      selector:
        text:

remove_tune:
  name: Remove Tune
  description: Remove the active Tune from a Tonie (restores original content).
  fields:
    entity_id:
      name: Tonie
      description: The Tonie media_player entity.
      required: true
      selector:
        entity:
          domain: media_player

redeem_voucher:
  name: Redeem Voucher
  description: Redeem a Tunes voucher code.
  fields:
    code:
      name: Voucher Code
      description: The voucher code to redeem.
      required: true
      selector:
        text:

dismiss_all_notifications:
  name: Dismiss All Notifications
  description: Clear all Toniebox account notifications.

accept_invitation:
  name: Accept Invitation
  description: Accept a pending household invitation.
  fields:
    invitation_id:
      name: Invitation ID
      description: The ID of the invitation (from the 'Pending Invitations' sensor).
      required: true
      selector:
        text:

decline_invitation:
  name: Decline Invitation
  description: Decline a pending household invitation.
  fields:
    invitation_id:
      name: Invitation ID
      description: The ID of the invitation (from the 'Pending Invitations' sensor).
      required: true
      selector:
        text:
